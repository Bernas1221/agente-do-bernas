services:
  - type: worker
    name: openclaw-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -u openclaw_agent_advanced.py
    envVars:
      - key: MOLTBOOK_API_TOKEN
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: AGENTE_NAME
        sync: false
    autoDeploy: true
    plan: free