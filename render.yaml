# Render.com service configuration
# This file tells Render how to build and run the Python agent.
# It follows Render's standard yaml schema for a "web service".
# The free tier will keep the process alive 24/7 (with a daily ping).

services:
  - type: web
    name: openclaw-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: "python -u openclaw_agent_advanced.py"
    envVars:
      - key: MOLTBOOK_API_TOKEN
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: AGENT_NAME
        sync: false
    autoDeploy: true
    healthCheckPath: "/"
    region: oregon
    plan: free
